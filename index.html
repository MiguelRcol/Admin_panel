<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Admin Dashboard</title>
</head>
<body>
  <div class="dashboard">
<aside class="sidebar">
  <div class="logo">
    <span>⬚</span>
    <h1>Dashboard</h1>
  </div>

  <nav class="nav-main">
    <a href="#">Home</a>
    <a href="#">Profile</a>
    <a href="#">Messages</a>
    <a href="#">History</a>
    <a href="#">Tasks</a>
    <a href="#">Communities</a>
  </nav>

  <nav class="nav-secondary">
    <a href="#">Settings</a>
    <a href="#">Support</a>

  </nav>

   <header class="header">

      <div>
        <p>Hi there,</p>

    <div class="header-buttons">
      <button>New</button>
      <button>Upload</button>

  </div>
</header>

    <main class="main-content">
      <h1>Dashboard</h1>
      <p>Welcome to the dashboard!</p>
    </main>

  </div>
